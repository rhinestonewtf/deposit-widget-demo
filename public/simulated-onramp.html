<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulated on-ramp</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fafafa;
        color: #52525c;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 10px;
        padding: 24px;
        box-sizing: border-box;
      }
      .badge {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9f9fa9;
        font-weight: 600;
      }
      .title {
        font-size: 15px;
        font-weight: 600;
        color: #18181b;
      }
      .hint {
        font-size: 12px;
        line-height: 1.5;
        max-width: 260px;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        background: #f4f4f5;
        border: 1px solid #e4e4e7;
        border-radius: 4px;
        padding: 1px 5px;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #18181b;
          color: #9f9fa9;
        }
        .title {
          color: #fafafa;
        }
        code {
          background: #27272a;
          border-color: #3f3f46;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">Simulated payment</div>
      <div class="title">No real on-ramp</div>
      <div class="hint">
        Use the <strong>Simulate on-ramp</strong> buttons below the widget to
        advance the order — start with <code>payment_pending</code>.
      </div>
    </div>
  </body>
</html>
